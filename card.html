<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Search - TohruDex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Back Button dynamic control link -->
    <a href="index.html" id="back-link" class="custom-back-btn">← Back Home</a>

    <!-- Container where either the grid list OR the final single card display goes -->
    <div id="result-container" class="loading-state">
        <p>Loading cards...</p>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const cardName = urlParams.get('name');
    const exactId = urlParams.get('id');
    const container = document.getElementById('result-container');
    const backLink = document.getElementById('back-link');

    // Check if the user is looking at a specific card or a general search list
    if (exactId) {
        // Fix back button so it returns to their search list instead of home
        backLink.href = `card.html?name=${encodeURIComponent(cardName || '')}`;
        backLink.innerText = "← Back to Results";
        fetchSingleCard(exactId);
    } else if (cardName) {
        fetchCardList(cardName);
    } else {
        container.innerHTML = `<p>No search term specified. <a href="index.html" class="custom-back-btn">Go Back</a></p>`;
    }

    // --- PHASE 1: FETCH ALL CARDS WITH THAT NAME ---
async function fetchCardList(name) {
    try {
        // Clean up the name string safely
        const cleanName = name.trim();
        
        // This query syntax checks if the name CONTAINS the text, catching VMAX, ex, etc., without needing broken wildcards
        const queryParam = encodeURIComponent(`name:"*${cleanName}*"`);
        const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=${queryParam}&pageSize=24`);
        
        if (response.status === 429) {
            showError('Too many requests! Please wait a minute before searching again.');
            return;
        }
        if (!response.ok) throw new Error('Network error');
        
        const data = await response.json();

        if (data.data && data.data.length > 0) {
            displayGrid(data.data, name);
        } else {
            showError(`Could not find any cards matching "${name}"`);
        }
    } catch (error) {
        // FIXED: Changing the fallback message so if it's a rate limit or network issue, the user knows exactly what to do!
        showError('Could not load cards. You might be rate-limited, or the name is misspelled. Please wait a moment and try again!');
    }
}

    // Render the selectable selection grid
    function displayGrid(cards, searchName) {
        container.classList.remove('loading-state');
        // Reset container classes if navigating backwards
        container.className = ""; 
        container.innerHTML = `
            <h2 class="grid-title font-kawaii">Select your card:</h2>
            <div class="cards-grid">
                ${cards.map(card => `
                    <div class="grid-card-item" onclick="selectCard('${card.id}', '${searchName}')">
                        <img src="${card.images.small}" alt="${card.name}">
                        <p class="font-standard">${card.set.name}<br><strong>${card.number}/${card.set.printedTotal}</strong></p>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function selectCard(id, name) {
        // Reloads the page passing the exact unique ID so Phase 2 kicks in
        window.location.href = `card.html?id=${id}&name=${encodeURIComponent(name)}`;
    }

    // --- PHASE 2: FETCH THE EXACT USER-SELECTED CARD ---
    async function fetchSingleCard(id) {
        try {
            const response = await fetch(`https://api.pokemontcg.io/v2/cards/${id}`);
            if (!response.ok) throw new Error('Card not found');
            const data = await response.json();
            displaySingleCard(data.data);
        } catch (error) {
            showError('Could not load card details.');
        }
    }

    // ze horizontal design layout
    function displaySingleCard(card) {
        container.classList.remove('loading-state');
        container.className = "card-display-box"; // Sets clean container alignment styles

        const tcgplayer = card.tcgplayer;
        let marketPrice = "N/A";
        
        if (tcgplayer && tcgplayer.prices) {
            const priceTypes = Object.keys(tcgplayer.prices);
            if (priceTypes.length > 0) {
                const priceData = tcgplayer.prices[priceTypes[0]];
                if (priceData.market) {
                    marketPrice = `$${priceData.market.toFixed(2)}`;
                } else if (priceData.mid) {
                    marketPrice = `$${priceData.mid.toFixed(2)}`;
                }
            }
        }

        container.innerHTML = `
            <img src="${card.images.large}" class="display-card-img" alt="${card.name}">
            <div class="display-info">
                <h2 class="font-kawaii">${card.name}</h2>
                <p class="set-info font-standard">${card.set.name} — ${card.number}/${card.set.printedTotal}</p>
                <div class="price-badge">
                    <span class="price-label font-kawaii">TCGPlayer Market Price</span>
                    <span class="price-val font-standard">${marketPrice}</span>
                </div>
            </div>
        `;
    }

    function showError(message) {
        container.className = "";
        container.innerHTML = `
            <p style="color: #ff4a4a; font-family: 'CustomKawaii', sans-serif; font-size: 1.5rem;">${message}</p>
        `;
    }
</script>
</body>
</html>
